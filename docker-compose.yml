services:
  postgres:
    image: postgres:16-alpine
    container_name: cotaweb_pg
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5436}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-cotaweb}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-senha}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
